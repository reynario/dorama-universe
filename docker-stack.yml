# Stack para Portainer em modo SWARM (deploy via "docker stack deploy").
# Swarm NAO builda imagem: primeiro voce builda 'dorama-universe:latest' (ver guia),
# depois sobe este stack que apenas USA a imagem pronta.
#
# Cole este conteudo no Web editor do stack e preencha as Environment variables.

services:
  dorama-universe:
    image: dorama-universe:latest
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      # --- Supabase (banco) ---
      DATABASE_URL: ${DATABASE_URL}
      # --- Payload ---
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      PAYLOAD_PUBLIC_SERVER_URL: ${PAYLOAD_PUBLIC_SERVER_URL}
      # --- Cloudflare R2 (imagens) ---
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      # --- Google AdSense ---
      NEXT_PUBLIC_ADSENSE_CLIENT: ${NEXT_PUBLIC_ADSENSE_CLIENT}
      NEXT_PUBLIC_ADSENSE_SLOT_HOME: ${NEXT_PUBLIC_ADSENSE_SLOT_HOME}
    deploy:
      replicas: 1
      restart_policy:
        condition: any
